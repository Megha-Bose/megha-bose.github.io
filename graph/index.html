<!doctype html>
<html lang="en">
<head>
  <title>Knowledge Graph // Megha Bose</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/main.min.edde8336ed5eb91775f350ce69ec87869d18014e9964f457e88c794cc444fc60.css" />
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .graph-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #1e2228;
    }

     
    .graph-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 52px;
      flex-shrink: 0;
      background: #242930;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .graph-bar-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #afbac4;
      white-space: nowrap;
    }
    .graph-bar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

     
    .graph-filters {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .graph-filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #afbac4;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,0.35); color: #fff; }
    .filter-btn.active { color: #1e2228; border-color: transparent; }

     
    .graph-search {
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #afbac4;
      font-size: 12px;
      padding: 5px 10px;
      outline: none;
      width: 180px;
      transition: border-color .15s, width .2s;
    }
    .graph-search::placeholder { color: rgba(255,255,255,0.3); }
    .graph-search:focus { border-color: rgba(255,255,255,0.3); width: 220px; }

     
    #graph-canvas {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #graph-canvas svg { display: block; cursor: grab; }
    #graph-canvas svg:active { cursor: grabbing; }

     
    #graph-tooltip {
      position: fixed;
      pointer-events: none;
      background: #242930;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 12.5px;
      color: #dde3ea;
      max-width: 280px;
      line-height: 1.5;
      display: none;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #graph-tooltip .tt-title { font-weight: 600; color: #fff; }
    #graph-tooltip .tt-cat { font-size: 11px; opacity: .6; margin-top: 2px; text-transform: capitalize; }
    #graph-tooltip .tt-hint { font-size: 11px; opacity: .4; margin-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 6px; }

     
    #graph-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 260px;
      background: #242930;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12.5px;
      color: #afbac4;
      display: none;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #graph-info .info-title {
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    #graph-info .info-section { margin-bottom: 8px; }
    #graph-info .info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }
    #graph-info .info-label.prereqs { color: #4ade80; }
    #graph-info .info-label.unlocks { color: #fbbf24; }
    #graph-info .info-items { display: flex; flex-direction: column; gap: 3px; }
    #graph-info .info-item {
      font-size: 11.5px;
      color: #c8d0d8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #graph-info .info-actions { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px; }
    #graph-info .info-open {
      display: inline-block;
      font-size: 11.5px;
      color: #57cc8a;
      text-decoration: none;
      cursor: pointer;
    }
    #graph-info .info-open:hover { text-decoration: underline; }
    #graph-info .info-close {
      float: right;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
    }
    #graph-info .info-close:hover { color: rgba(255,255,255,0.6); }

     
    #graph-legend {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: rgba(255,255,255,0.45); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

     
    #graph-no-results {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(255,255,255,0.2);
      font-size: 14px;
      display: none;
      pointer-events: none;
    }

     
    .graph-back {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      white-space: nowrap;
    }
    .graph-back:hover { color: rgba(255,255,255,0.6); }

     
    .progress-counter {
      margin-left: auto;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .progress-counter em {
      color: #4ade80;
      font-style: normal;
      font-weight: 600;
    }

     
    .hide-done-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .hide-done-btn:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.65); }
    .hide-done-btn.active { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.4); color: #4ade80; }

     
    .info-mark {
      float: right;
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all .15s;
    }
    .info-mark:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
    .info-mark.done { background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.5); color: #4ade80; }
    .info-mark.done:hover { background: rgba(74,222,128,0.22); border-color: #4ade80; }
  </style>
</head>
<body>
<div class="graph-wrap">

  
  <div class="graph-bar">
    <a class="graph-back" href="/">← Home</a>
    <div class="graph-bar-sep"></div>
    <span class="graph-bar-title">Knowledge Graph</span>
    <div class="graph-bar-sep"></div>
    <div class="graph-filters" id="filters">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="math" style="--c:#5B8BDB">Math</button>
      <button class="filter-btn" data-cat="ml" style="--c:#A78BFA">ML</button>
      <button class="filter-btn" data-cat="algorithms" style="--c:#4ade80">Algorithms</button>
      <button class="filter-btn" data-cat="computer-systems" style="--c:#F6A040">Systems</button>
      <button class="filter-btn" data-cat="information-theory" style="--c:#2dd4bf">Info Theory</button>
      <button class="filter-btn" data-cat="programming" style="--c:#fb7185">Programming</button>
    </div>
    <span class="progress-counter" id="progress-counter"><em>0</em> / 0 proofread</span>
    <button class="hide-done-btn" id="hide-done-btn">Hide done</button>
    <div class="graph-bar-sep"></div>
    <input class="graph-search" id="search" placeholder="Search posts…" type="text" />
  </div>

  
  <div id="graph-canvas">
    <div id="graph-legend"></div>
    <div id="graph-info"></div>
    <div id="graph-no-results">No posts match your search.</div>
  </div>

  
  <div id="graph-tooltip"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="/js/graph-data.js"></script>
<script>
(function () {
  'use strict';

   
  const STORAGE_KEY = 'proofread_posts';
  const completed = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

   
  const CAT = {
    'math':               { color: '#5B8BDB', label: 'Math' },
    'ml':                 { color: '#A78BFA', label: 'ML' },
    'algorithms':         { color: '#4ade80', label: 'Algorithms' },
    'computer-systems':   { color: '#F6A040', label: 'Systems' },
    'information-theory': { color: '#2dd4bf', label: 'Info Theory' },
    'programming':        { color: '#fb7185', label: 'Programming' },
  };

   
  const CLUSTER = {
    'math':               { x: -0.18, y: -0.20 },
    'ml':                 { x:  0.22, y: -0.18 },
    'algorithms':         { x:  0.22, y:  0.22 },
    'computer-systems':   { x: -0.05, y:  0.28 },
    'information-theory': { x: -0.32, y:  0.05 },
    'programming':        { x:  0.08, y:  0.10 },
  };

   
  const canvasEl  = document.getElementById('graph-canvas');
  const tooltip   = document.getElementById('graph-tooltip');
  const infoPanel = document.getElementById('graph-info');
  const noResults = document.getElementById('graph-no-results');
  const searchEl  = document.getElementById('search');
  const legendEl  = document.getElementById('graph-legend');

   
  Object.entries(CAT).forEach(([cat, {color, label}]) => {
    legendEl.innerHTML += `<div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      <span>${label}</span>
    </div>`;
  });
  legendEl.innerHTML += `<div class="legend-item" style="margin-top:4px;opacity:0.7">
    <svg width="14" height="14" style="flex-shrink:0">
      <circle cx="7" cy="7" r="5" fill="#fff" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <circle cx="7" cy="7" r="8.5" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-dasharray="3 2"/>
    </svg>
    <span>Proofread</span>
  </div>`;

  /* ── filter pill colours ── */
  document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
    const c = btn.style.getPropertyValue('--c');
    if (c) {
      btn.addEventListener('mouseenter', () => { if (!btn.classList.contains('active')) btn.style.background = c + '22'; });
      btn.addEventListener('mouseleave', () => { if (!btn.classList.contains('active')) btn.style.background = ''; });
      btn.dataset.color = c;
    }
  });

  /* ── sizes ── */
  let W = canvasEl.clientWidth;
  let H = canvasEl.clientHeight;

  /* ── SVG ── */
  const svg = d3.select('#graph-canvas').append('svg')
    .attr('width', W).attr('height', H);

  /* arrowhead markers */
  const defs = svg.append('defs');
  function mkMarker(id, color, opacity) {
    defs.append('marker')
      .attr('id', id)
      .attr('viewBox', '0 -3.5 7 7')
      .attr('refX', 18)
      .attr('refY', 0)
      .attr('markerWidth', 4)
      .attr('markerHeight', 4)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-3.5L7,0L0,3.5')
      .attr('fill', color)
      .attr('opacity', opacity);
  }
  mkMarker('arr-default', 'rgba(255,255,255,0.25)', 1);
  mkMarker('arr-prereq',  '#4ade80', 1);
  mkMarker('arr-unlock',  '#fbbf24', 1);
  mkMarker('arr-dim',     'rgba(255,255,255,0.04)', 1);
  Object.entries(CAT).forEach(([cat, {color}]) => {
    mkMarker(`arr-${cat}`, color, 0.7);
  });

  /* zoom group */
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => {
    g.attr('transform', e.transform);
    currentZoom = e.transform.k;
    updateLabels();
  });
  svg.call(zoom);
  let currentZoom = 1;

  /* ── data (deep clone to avoid D3 mutation issues) ── */
  const nodes = GRAPH_DATA.nodes.map(d => ({ ...d }));
  const edges = GRAPH_DATA.edges.map(d => ({ ...d }));

  /* index */
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

  /* adjacency for quick neighbour lookup */
  const prereqsOf  = {};   // prereqsOf[id]  = set of nodes that MUST be read before id
  const unlocksFor = {};   
  nodes.forEach(n => { prereqsOf[n.id] = new Set(); unlocksFor[n.id] = new Set(); });
  edges.forEach(e => {
    unlocksFor[e.source] = unlocksFor[e.source] || new Set();
    prereqsOf[e.target]  = prereqsOf[e.target]  || new Set();
    unlocksFor[e.source].add(e.target);
    prereqsOf[e.target].add(e.source);
  });

   
  nodes.forEach(n => {
    const c = CLUSTER[n.category] || {x: 0, y: 0};
    n.x = c.x * W + (Math.random() - .5) * 160;
    n.y = c.y * H + (Math.random() - .5) * 160;
  });

   
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges)
      .id(d => d.id)
      .distance(55)
      .strength(0.4))
    .force('charge', d3.forceManyBody().strength(-180).distanceMax(300))
    .force('collide', d3.forceCollide(10).strength(0.7))
    .force('cx', d3.forceX(n => (CLUSTER[n.category]?.x || 0) * W + W/2).strength(0.06))
    .force('cy', d3.forceY(n => (CLUSTER[n.category]?.y || 0) * H + H/2).strength(0.06))
    .alphaDecay(0.03)
    .velocityDecay(0.4);

   
  const linkG = g.append('g').attr('class', 'links');
  let linkEls = linkG.selectAll('line')
    .data(edges)
    .enter().append('line')
    .attr('stroke', 'rgba(255,255,255,0.12)')
    .attr('stroke-width', 0.7)
    .attr('marker-end', 'url(#arr-default)');

   
  const haloG = g.append('g').attr('class', 'halos');
  let haloEls = haloG.selectAll('circle')
    .data(nodes)
    .enter().append('circle')
    .attr('r', 10)
    .attr('fill', 'none')
    .attr('stroke', d => CAT[d.category]?.color || '#888')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3 2')
    .attr('stroke-opacity', d => completed.has(d.id) ? 0.7 : 0)
    .attr('pointer-events', 'none');

   
  const nodeG = g.append('g').attr('class', 'nodes');
  let nodeEls = nodeG.selectAll('circle')
    .data(nodes)
    .enter().append('circle')
    .attr('r', 5)
    .attr('fill', nodeFill)
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => CAT[d.category]?.color || '#888')
    .attr('stroke-opacity', 0.4)
    .attr('stroke-width', nodeStrokeWidth)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag',  dragged)
      .on('end',   dragEnd))
    .on('mouseover', onHover)
    .on('mousemove', onHoverMove)
    .on('mouseout',  onHoverOut)
    .on('click', onClick)
    .on('dblclick', onDblClick);

   
  const labelG = g.append('g').attr('class', 'labels').attr('pointer-events', 'none');
  let labelEls = labelG.selectAll('text')
    .data(nodes)
    .enter().append('text')
    .attr('font-size', 9)
    .attr('fill', '#dde3ea')
    .attr('fill-opacity', 0)
    .attr('text-anchor', 'middle')
    .attr('dy', '-8')
    .text(d => d.label);

  function updateLabels() {
    labelEls.attr('fill-opacity', currentZoom > 2.5 ? 0.7 : 0);
  }

   
  sim.on('tick', () => {
    linkEls
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    haloEls
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);
    nodeEls
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);
    labelEls
      .attr('x', d => d.x)
      .attr('y', d => d.y);
  });

   
  let activeNode = null;
  let activeFilter = 'all';
  let searchQ = '';
  let hideDone = false;

   
  function onHover(event, d) {
    tooltip.style.display = 'block';
    tooltip.innerHTML = `
      <div class="tt-title">${d.fullLabel}</div>
      <div class="tt-cat">${CAT[d.category]?.label || d.category}</div>
      <div class="tt-hint">Click to explore &nbsp;·&nbsp; Double-click to open</div>`;
    d3.select(this).attr('r', 8).attr('fill-opacity', 1);
  }
  function onHoverMove(event) {
    const x = event.clientX, y = event.clientY;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    tooltip.style.left = (x + 14 + tw > window.innerWidth ? x - tw - 14 : x + 14) + 'px';
    tooltip.style.top  = (y + 14 + th > window.innerHeight ? y - th - 14 : y + 14) + 'px';
  }
  function onHoverOut(event, d) {
    tooltip.style.display = 'none';
    if (activeNode !== d) d3.select(this).attr('r', nodeRadius(d)).attr('fill-opacity', nodeOpacity(d));
  }

  function nodeRadius(d) {
    if (!activeNode && !searchQ) return completed.has(d.id) ? 6 : 5;
    if (activeNode === d) return 9;
    if (activeNode) {
      if (prereqsOf[activeNode.id]?.has(d.id)) return 7;
      if (unlocksFor[activeNode.id]?.has(d.id)) return 7;
      return 4;
    }
    return d._match ? 8 : 4;
  }
  function nodeOpacity(d) {
    if (!activeNode && !searchQ) return 0.85;
    if (activeNode) {
      if (activeNode === d) return 1;
      if (prereqsOf[activeNode.id]?.has(d.id)) return 1;
      if (unlocksFor[activeNode.id]?.has(d.id)) return 1;
      return 0.12;
    }
    return d._match ? 1 : 0.12;
  }
  function nodeStrokeOpacity(d) {
    if (completed.has(d.id)) {
      if (!activeNode && !searchQ) return 0.9;
      if (activeNode === d) return 1;
      if (activeNode) {
        if (prereqsOf[activeNode.id]?.has(d.id)) return 1;
        if (unlocksFor[activeNode.id]?.has(d.id)) return 1;
        return 0.2;
      }
      return d._match ? 0.9 : 0.15;
    }
    if (!activeNode && !searchQ) return 0.4;
    if (activeNode) {
      if (activeNode === d) return 1;
      if (prereqsOf[activeNode.id]?.has(d.id)) return 0.9;
      if (unlocksFor[activeNode.id]?.has(d.id)) return 0.9;
      return 0.04;
    }
    return d._match ? 0.8 : 0.05;
  }
  function nodeFill(d) {
    if (completed.has(d.id)) return '#fff';
    return CAT[d.category]?.color || '#888';
  }
  function nodeStrokeWidth(d) {
    return completed.has(d.id) ? 2 : 1.2;
  }

  function saveCompleted() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
  }
  function updateProgressCounter() {
    const el = document.getElementById('progress-counter');
    el.innerHTML = `<em>${completed.size}</em> / ${nodes.length} proofread`;
  }
  function toggleCompleted(id) {
    if (completed.has(id)) completed.delete(id);
    else completed.add(id);
    saveCompleted();
    updateProgressCounter();
    refreshVisuals();
    const btn = document.getElementById('info-mark-btn');
    if (btn && btn.dataset.id === id) {
      const done = completed.has(id);
      btn.textContent = done ? '✓ Proofread' : 'Mark as proofread';
      btn.classList.toggle('done', done);
    }
    if (hideDone) applyFilter();
  }

  function linkColor(d) {
    if (!activeNode) return 'rgba(255,255,255,0.10)';
    const sId = d.source.id || d.source;
    const tId = d.target.id || d.target;
    if (activeNode.id === tId && prereqsOf[activeNode.id]?.has(sId)) return '#4ade80';
    if (activeNode.id === sId && unlocksFor[activeNode.id]?.has(tId)) return '#fbbf24';
    return 'rgba(255,255,255,0.03)';
  }
  function linkArrow(d) {
    if (!activeNode) return 'url(#arr-default)';
    const sId = d.source.id || d.source;
    const tId = d.target.id || d.target;
    if (activeNode.id === tId && prereqsOf[activeNode.id]?.has(sId)) return 'url(#arr-prereq)';
    if (activeNode.id === sId && unlocksFor[activeNode.id]?.has(tId)) return 'url(#arr-unlock)';
    return 'url(#arr-dim)';
  }
  function linkWidth(d) {
    if (!activeNode) return 0.7;
    const sId = d.source.id || d.source;
    const tId = d.target.id || d.target;
    if ((activeNode.id === tId) || (activeNode.id === sId)) return 1.5;
    return 0.4;
  }

  function haloOpacity(d) {
    if (!completed.has(d.id)) return 0;
    if (!activeNode && !searchQ) return 0.7;
    if (activeNode === d) return 1;
    if (activeNode) {
      if (prereqsOf[activeNode.id]?.has(d.id)) return 0.9;
      if (unlocksFor[activeNode.id]?.has(d.id)) return 0.9;
      return 0.1;
    }
    return d._match ? 0.7 : 0.05;
  }

  function refreshVisuals() {
    haloEls
      .attr('r', d => activeNode === d ? 13 : 10)
      .attr('stroke-opacity', haloOpacity);
    nodeEls
      .attr('r', nodeRadius)
      .attr('fill', nodeFill)
      .attr('fill-opacity', nodeOpacity)
      .attr('stroke-opacity', nodeStrokeOpacity)
      .attr('stroke-width', nodeStrokeWidth);
    linkEls
      .attr('stroke', linkColor)
      .attr('stroke-width', linkWidth)
      .attr('marker-end', linkArrow);
  }

  /* ── click: select node ── */
  function onClick(event, d) {
    event.stopPropagation();
    if (activeNode === d) {
      activeNode = null;
      hideInfo();
    } else {
      activeNode = d;
      showInfo(d);
    }
    refreshVisuals();
  }

  /* ── double-click: open post ── */
  function onDblClick(event, d) {
    window.open(`/posts/${d.id}/`, '_blank', 'noopener');
  }

  /* ── click canvas: deselect ── */
  svg.on('click', () => {
    if (activeNode) {
      activeNode = null;
      hideInfo();
      refreshVisuals();
    }
  });

  /* ── info panel ── */
  function showInfo(d) {
    const prereqs = [...(prereqsOf[d.id] || [])].map(id => nodeById[id]?.label).filter(Boolean);
    const unlocks = [...(unlocksFor[d.id] || [])].map(id => nodeById[id]?.label).filter(Boolean);
    const color = CAT[d.category]?.color || '#888';
    const isDone = completed.has(d.id);

    let prereqHtml = prereqs.length
      ? prereqs.slice(0,5).map(l => `<div class="info-item">· ${l}</div>`).join('')
         + (prereqs.length > 5 ? `<div class="info-item" style="opacity:.5">+${prereqs.length-5} more</div>` : '')
      : '<div class="info-item" style="opacity:.4">None — entry-level post</div>';

    let unlockHtml = unlocks.length
      ? unlocks.slice(0,5).map(l => `<div class="info-item">· ${l}</div>`).join('')
         + (unlocks.length > 5 ? `<div class="info-item" style="opacity:.5">+${unlocks.length-5} more</div>` : '')
      : '<div class="info-item" style="opacity:.4">Endpoint — no dependents</div>';

    infoPanel.innerHTML = `
      <div class="info-close" id="info-close">✕</div>
      <div class="info-title" style="border-left:3px solid ${color};padding-left:8px">${d.fullLabel}</div>
      <div class="info-section">
        <div class="info-label prereqs">Read first (${prereqs.length})</div>
        <div class="info-items">${prereqHtml}</div>
      </div>
      <div class="info-section">
        <div class="info-label unlocks">Unlocks (${unlocks.length})</div>
        <div class="info-items">${unlockHtml}</div>
      </div>
      <div class="info-actions">
        <a class="info-open" href="/posts/${d.id}/" target="_blank" rel="noopener">Open post →</a>
        <button class="info-mark${isDone ? ' done' : ''}" id="info-mark-btn" data-id="${d.id}">${isDone ? '✓ Proofread' : 'Mark as proofread'}</button>
      </div>`;
    infoPanel.style.display = 'block';
    document.getElementById('info-close').onclick = () => {
      activeNode = null;
      hideInfo();
      refreshVisuals();
    };
    document.getElementById('info-mark-btn').addEventListener('click', function() {
      toggleCompleted(this.dataset.id);
    });
  }
  function hideInfo() {
    infoPanel.style.display = 'none';
  }

   
  function dragStart(event, d) {
    if (!event.active) sim.alphaTarget(0.2).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function dragEnd(event, d) {
    if (!event.active) sim.alphaTarget(0);
    d.fx = null; d.fy = null;
  }

   
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const col = btn.dataset.color;
    if (col) btn.style.setProperty('--c', col);

    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = '';
        b.style.color = '#afbac4';
        b.style.borderColor = 'rgba(255,255,255,0.15)';
      });
      btn.classList.add('active');
      if (col) { btn.style.background = col; btn.style.borderColor = col; }
      else { btn.style.background = 'rgba(255,255,255,0.12)'; }
      btn.style.color = '#1e2228';
      activeFilter = cat;
      activeNode = null;
      hideInfo();
      applyFilter();
    });
  });

  function applyFilter() {
    const q = searchQ.toLowerCase();
    nodeEls.each(function(d) {
      const catMatch = activeFilter === 'all' || d.category === activeFilter;
      const searchMatch = !q || d.label.toLowerCase().includes(q) || d.fullLabel.toLowerCase().includes(q);
      const doneHidden = hideDone && completed.has(d.id);
      d._visible = catMatch && !doneHidden;
      d._match   = catMatch && searchMatch && !doneHidden;
    });
    haloEls
      .attr('display', d => (d._visible && completed.has(d.id)) ? null : 'none');
    nodeEls
      .attr('display', d => d._visible ? null : 'none')
      .attr('r', d => d._match ? (d._match && q ? 8 : 5) : 5)
      .attr('fill-opacity', d => {
        if (!d._visible) return 0;
        if (!q) return 0.85;
        return d._match ? 1 : 0.1;
      })
      .attr('stroke-opacity', d => {
        if (!d._visible) return 0;
        if (!q) return 0.4;
        return d._match ? 0.8 : 0.05;
      });
    linkEls.attr('display', d => {
      const sId = d.source.id || d.source;
      const tId = d.target.id || d.target;
      const sv = nodeById[sId]?._visible;
      const tv = nodeById[tId]?._visible;
      return (sv && tv) ? null : 'none';
    });
    labelEls.attr('display', d => d._visible ? null : 'none');
    haloEls.attr('display', d => (d._visible && completed.has(d.id)) ? null : 'none');
    noResults.style.display = (q && !nodes.some(n => n._match)) ? 'block' : 'none';
  }

   
  searchEl.addEventListener('input', function() {
    searchQ = this.value.trim();
    activeNode = null;
    hideInfo();
    applyFilter();
    refreshVisuals();

     
    if (searchQ) {
      const match = nodes.find(n => n._match);
      if (match) {
        const tx = W/2 - match.x * 1.5;
        const ty = H/2 - match.y * 1.5;
        svg.transition().duration(500)
          .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(1.5));
      }
    }
  });

   
  document.getElementById('hide-done-btn').addEventListener('click', function() {
    hideDone = !hideDone;
    this.classList.toggle('active', hideDone);
    activeNode = null;
    hideInfo();
    applyFilter();
    refreshVisuals();
  });

   
  nodes.forEach(n => { n._visible = true; n._match = true; });
  updateProgressCounter();

   
  sim.on('end', () => {
    const pad = 60;
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const x0 = Math.min(...xs) - pad, x1 = Math.max(...xs) + pad;
    const y0 = Math.min(...ys) - pad, y1 = Math.max(...ys) + pad;
    const scale = Math.min(W / (x1-x0), H / (y1-y0), 1);
    const tx = W/2 - scale*(x0+x1)/2;
    const ty = H/2 - scale*(y0+y1)/2;
    svg.transition().duration(800)
      .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
  });

   
  window.addEventListener('resize', () => {
    W = canvasEl.clientWidth;
    H = canvasEl.clientHeight;
    svg.attr('width', W).attr('height', H);
    sim.force('cx', d3.forceX(n => (CLUSTER[n.category]?.x || 0)*W + W/2).strength(0.06));
    sim.force('cy', d3.forceY(n => (CLUSTER[n.category]?.y || 0)*H + H/2).strength(0.06));
    sim.alpha(0.1).restart();
  });

})();
</script>

<script>
  (function() {
    var btn = document.createElement('button');
    
  })();
</script>
</body>
</html>
