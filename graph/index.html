<!doctype html>
<html lang="en">
<head>
  <title>Knowledge Graph // Megha Bose</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/main.min.203fbf6e7c2ae59fc8c89935e4475d81dcde10b663d6fb10208dee4199098771.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .graph-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #f4e8c1;
      font-family: 'IM Fell English SC', Georgia, serif;
    }

     
    .graph-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 56px;
      flex-shrink: 0;
      background: #8b6914;
      border-bottom: 2px solid #5c3d11;
    }
    .graph-bar-title-wrap {
      display: flex;
      flex-direction: column;
      white-space: nowrap;
    }
    .graph-bar-title {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: .08em;
      color: #f4e8c1;
      font-family: 'IM Fell English SC', Georgia, serif;
      line-height: 1.2;
    }
    .graph-bar-subtitle {
      font-size: 9px;
      color: rgba(244,232,193,0.6);
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      letter-spacing: .04em;
    }
    .graph-bar-sep { width: 1px; height: 24px; background: rgba(244,232,193,0.25); flex-shrink: 0; }

     
    .graph-filters {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .graph-filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 3px;
      border: 1px solid rgba(244,232,193,0.35);
      background: transparent;
      color: rgba(244,232,193,0.75);
      font-size: 11px;
      font-family: 'IM Fell English SC', Georgia, serif;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: rgba(244,232,193,0.7); color: #f4e8c1; }
    .filter-btn.active { color: #2c1810; border-color: transparent; background: #f4e8c1; }

     
    .graph-search {
      flex-shrink: 0;
      background: rgba(244,232,193,0.12);
      border: 1px solid rgba(244,232,193,0.3);
      border-radius: 3px;
      color: #f4e8c1;
      font-size: 11px;
      font-family: 'IM Fell English SC', Georgia, serif;
      padding: 5px 10px;
      outline: none;
      width: 180px;
      transition: border-color .15s, width .2s;
    }
    .graph-search::placeholder { color: rgba(244,232,193,0.38); }
    .graph-search:focus { border-color: rgba(244,232,193,0.6); width: 220px; }

     
    #graph-canvas {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #graph-canvas svg { display: block; cursor: grab; }
    #graph-canvas svg:active { cursor: grabbing; }

     
    #graph-tooltip {
      position: fixed;
      pointer-events: none;
      background: #fdf6e3;
      border: 1px solid #8b6914;
      border-radius: 3px;
      padding: 9px 13px;
      font-size: 12px;
      font-family: 'IM Fell English', Georgia, serif;
      color: #2c1810;
      max-width: 280px;
      line-height: 1.5;
      display: none;
      z-index: 999;
      box-shadow: 2px 4px 14px rgba(44,24,16,0.2);
    }
    #graph-tooltip .tt-title { font-weight: 400; color: #2c1810; font-family: 'IM Fell English SC', Georgia, serif; }
    #graph-tooltip .tt-cat { font-size: 10px; opacity: .6; margin-top: 2px; text-transform: capitalize; }
    #graph-tooltip .tt-hint { font-size: 10px; opacity: .45; margin-top: 6px; border-top: 1px solid rgba(44,24,16,0.12); padding-top: 6px; font-style: italic; }

     
    #graph-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 260px;
      background: #fdf6e3;
      border: 1px solid #8b6914;
      border-radius: 3px;
      padding: 14px 16px;
      font-size: 12px;
      font-family: 'IM Fell English', Georgia, serif;
      color: #2c1810;
      display: none;
      z-index: 10;
      box-shadow: 2px 6px 20px rgba(44,24,16,0.22);
    }
    #graph-info .info-title {
      font-size: 13px;
      font-family: 'IM Fell English SC', Georgia, serif;
      color: #2c1810;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    #graph-info .info-section { margin-bottom: 8px; }
    #graph-info .info-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 4px;
      font-family: 'IM Fell English SC', Georgia, serif;
    }
    #graph-info .info-label.prereqs { color: #14532d; }
    #graph-info .info-label.unlocks { color: #7c2d12; }
    #graph-info .info-items { display: flex; flex-direction: column; gap: 3px; }
    #graph-info .info-item {
      font-size: 11px;
      color: #3d2010;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #graph-info .info-actions { margin-top: 10px; border-top: 1px solid rgba(44,24,16,0.12); padding-top: 10px; }
    #graph-info .info-open {
      display: inline-block;
      font-size: 11px;
      color: #14532d;
      font-style: italic;
      text-decoration: none;
      cursor: pointer;
    }
    #graph-info .info-open:hover { text-decoration: underline; }
    #graph-info .info-close {
      float: right;
      font-size: 11px;
      color: rgba(44,24,16,0.38);
      cursor: pointer;
    }
    #graph-info .info-close:hover { color: rgba(44,24,16,0.75); }

     
    #graph-legend {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 10px; font-family: 'IM Fell English SC', Georgia, serif; color: rgba(44,24,16,0.5); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

     
    #graph-no-results {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(44,24,16,0.35);
      font-size: 14px;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      display: none;
      pointer-events: none;
    }

     
    .graph-back {
      font-size: 12px;
      color: rgba(244,232,193,0.65);
      text-decoration: none;
      white-space: nowrap;
      font-family: 'IM Fell English SC', Georgia, serif;
    }
    .graph-back:hover { color: #f4e8c1; }

  </style>
</head>
<body>
<div class="graph-wrap">

  
  <div class="graph-bar">
    <a class="graph-back" href="/">← Home</a>
    <div class="graph-bar-sep"></div>
    <div class="graph-bar-title-wrap">
      <span class="graph-bar-title">The Knowledge Map</span>
      <span class="graph-bar-subtitle">I solemnly swear that I am up to no good</span>
    </div>
    <div class="graph-bar-sep"></div>
    <div class="graph-filters" id="filters">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="math" style="--c:#0E1A40">Math</button>
      <button class="filter-btn" data-cat="ml" style="--c:#1A472A">Machine Learning</button>
      <button class="filter-btn" data-cat="algorithms" style="--c:#740001">Algorithms</button>
      <button class="filter-btn" data-cat="computer-systems" style="--c:#6B4C11">Systems</button>
      <button class="filter-btn" data-cat="programming" style="--c:#1C1C3C">Programming</button>
    </div>
    <div class="graph-bar-sep"></div>
    <input class="graph-search" id="search" placeholder="Search posts…" type="text" />
  </div>

  
  <div id="graph-canvas">
    <div id="graph-legend"></div>
    <div id="graph-info"></div>
    <div id="graph-no-results">No posts match your search.</div>
  </div>

  
  <div id="graph-tooltip"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="/js/graph-data.js"></script>
<script>
(function () {
  'use strict';

   
  const CAT = {
    'math':               { color: '#0E1A40', label: 'Math' },         
    'ml':                 { color: '#1A472A', label: 'Machine Learning' },  
    'algorithms':         { color: '#740001', label: 'Algorithms' },   
    'computer-systems':   { color: '#6B4C11', label: 'Systems' },      
    'programming':        { color: '#1C1C3C', label: 'Programming' },  
  };

   
  const ROOMS = {
    'math':               { name: 'The Mathematics Tower',   subtitle: 'Mathematics' },
    'ml':                 { name: 'The Machine Learning Workshop', subtitle: 'Machine Learning' },
    'algorithms':         { name: 'The Algorithms Hall',     subtitle: 'Algorithms' },
    'computer-systems':   { name: 'The Systems Cellar',      subtitle: 'Systems' },
    'programming':        { name: 'The Scriptorium',         subtitle: 'Programming' },
  };

  

  const DOORS = [
    ['math', 'ml'],
    ['math', 'algorithms'],
    ['math', 'computer-systems'],
    ['algorithms', 'computer-systems'],
    ['algorithms', 'programming'],
    ['computer-systems', 'ml'],
  ];

   
  const canvasEl  = document.getElementById('graph-canvas');
  const tooltip   = document.getElementById('graph-tooltip');
  const infoPanel = document.getElementById('graph-info');
  const noResults = document.getElementById('graph-no-results');
  const searchEl  = document.getElementById('search');
  const legendEl  = document.getElementById('graph-legend');

   
  Object.entries(CAT).forEach(([cat, {color, label}]) => {
    legendEl.innerHTML += `<div class="legend-item">
      <svg width="18" height="12" style="flex-shrink:0;overflow:visible">
        <rect x="0" y="0" width="18" height="12" rx="2" fill="#fdf6e3" stroke="${color}" stroke-width="1.2"/>
        <path d="M0,0 L9,5.5 L18,0" fill="none" stroke="${color}" stroke-width="0.7" stroke-opacity="0.55"/>
        <circle cx="9" cy="5.5" r="2.2" fill="#740001" stroke="#D3A625" stroke-width="0.5"/>
      </svg>
      <span>${label}</span>
    </div>`;
  });

  /* ── filter pill colours ── */
  document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
    const c = btn.style.getPropertyValue('--c');
    if (c) {
      btn.addEventListener('mouseenter', () => { if (!btn.classList.contains('active')) btn.style.background = c + '22'; });
      btn.addEventListener('mouseleave', () => { if (!btn.classList.contains('active')) btn.style.background = ''; });
      btn.dataset.color = c;
    }
  });

  /* ── sizes ── */
  let W = canvasEl.clientWidth;
  let H = canvasEl.clientHeight;

  /* ── SVG ── */
  const svg = d3.select('#graph-canvas').append('svg')
    .attr('width', W).attr('height', H);

  /* parchment background gradient */
  const defs = svg.append('defs');
  const bgGrad = defs.append('radialGradient')
    .attr('id', 'parchment-grad')
    .attr('cx', '40%').attr('cy', '45%')
    .attr('r', '65%');
  bgGrad.append('stop').attr('offset', '0%').attr('stop-color', '#fdf6e3');
  bgGrad.append('stop').attr('offset', '60%').attr('stop-color', '#f4e8c1');
  bgGrad.append('stop').attr('offset', '100%').attr('stop-color', '#e8d89a');

  svg.append('rect')
    .attr('width', '100%').attr('height', '100%')
    .attr('fill', 'url(#parchment-grad)');

  /* zoom group */
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => {
    g.attr('transform', e.transform);
    currentZoom = e.transform.k;
    updateLabels();
  });
  svg.call(zoom);
  let currentZoom = 1;

  /* ── compass rose & map border: fixed in screen space, outside the pan/zoom
     group so they never move when the user pans or zooms the map ── */
  const INK = '#5c3d11';
  const compassG = svg.append('g').attr('class', 'compass-rose').attr('pointer-events', 'none');
  const borderG  = svg.append('g').attr('class', 'map-border').attr('pointer-events', 'none');

  function renderCompass() {
    compassG.selectAll('*').remove();
    const r = 30;
    compassG.append('circle')
      .attr('r', r).attr('fill', 'none').attr('stroke', INK).attr('stroke-width', 1.2).attr('stroke-opacity', 0.55);
    compassG.append('circle')
      .attr('r', r - 7).attr('fill', 'none').attr('stroke', INK).attr('stroke-width', 0.7).attr('stroke-opacity', 0.35);
    /* center diamond */
    compassG.append('path')
      .attr('d', `M0,${-6} L6,0 L0,6 L-6,0 Z`)
      .attr('fill', INK).attr('fill-opacity', 0.45);
    /* N/E/S/W ticks + letters */
    [['N', 0, -1], ['E', 1, 0], ['S', 0, 1], ['W', -1, 0]].forEach(([letter, dx, dy]) => {
      compassG.append('line')
        .attr('x1', dx * (r - 7)).attr('y1', dy * (r - 7))
        .attr('x2', dx * r).attr('y2', dy * r)
        .attr('stroke', INK).attr('stroke-width', 1.2).attr('stroke-opacity', 0.55);
      compassG.append('text')
        .attr('x', dx * (r + 11)).attr('y', dy * (r + 11) + 3.5)
        .attr('text-anchor', 'middle')
        .attr('font-size', letter === 'N' ? 12 : 10)
        .attr('font-family', "'IM Fell English SC', Georgia, serif")
        .attr('fill', INK).attr('fill-opacity', 0.6)
        .text(letter);
    });
  }
  function updateCompass() {
    compassG.attr('transform', `translate(${W - 64},${H - 64}) rotate(6)`);
  }

  function renderBorder() {
    borderG.selectAll('*').remove();
    borderG.append('rect').attr('class', 'border-outer')
      .attr('fill', 'none').attr('stroke', INK).attr('stroke-width', 1.4).attr('stroke-opacity', 0.3).attr('rx', 6);
    borderG.append('rect').attr('class', 'border-inner')
      .attr('fill', 'none').attr('stroke', INK).attr('stroke-width', 0.7).attr('stroke-opacity', 0.2).attr('rx', 4);
    /* small corner flourishes: a short L-shaped double tick at each corner */
    const flourish = 'M0,18 L0,4 Q0,0 4,0 L18,0';
    [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx, sy]) => {
      borderG.append('path')
        .attr('class', 'border-flourish')
        .attr('d', flourish)
        .attr('fill', 'none').attr('stroke', INK).attr('stroke-width', 1).attr('stroke-opacity', 0.4)
        .attr('data-sx', sx).attr('data-sy', sy);
    });
  }
  function updateBorder() {
    const inset = 10;
    borderG.select('.border-outer')
      .attr('x', inset).attr('y', inset).attr('width', W - inset*2).attr('height', H - inset*2);
    borderG.select('.border-inner')
      .attr('x', inset + 6).attr('y', inset + 6).attr('width', W - (inset+6)*2).attr('height', H - (inset+6)*2);
    borderG.selectAll('.border-flourish').each(function() {
      const el = d3.select(this);
      const sx = +el.attr('data-sx'), sy = +el.attr('data-sy');
      const x = sx > 0 ? inset : W - inset;
      const y = sy > 0 ? inset : H - inset;
      const scaleX = sx > 0 ? 1 : -1, scaleY = sy > 0 ? 1 : -1;
      el.attr('transform', `translate(${x},${y}) scale(${scaleX},${scaleY})`);
    });
  }
  renderCompass();
  renderBorder();
  updateCompass();
  updateBorder();

  /* ── data ── */
  const nodes = GRAPH_DATA.nodes.map(d => ({ ...d }));
  const edges = GRAPH_DATA.edges.map(d => ({ ...d }));

  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

  /* ── room sizing, layout & doorway targets, derived once from the data above ── */
  const CELL         = 34;  /* grid cell per envelope - generous spacing for easy clicking */
  const ROOM_PADDING = 80;  /* clearance from the grid to the room wall (fits title/subtitle) */
  const ROOM_GUTTER  = 70;  /* spacing between adjacent rooms so they never overlap */

  const roomCounts = Object.fromEntries(d3.rollup(nodes, v => v.length, d => d.category));
  function roomGridSide(cat) {
    return Math.max(1, Math.ceil(Math.sqrt(roomCounts[cat] || 1)));
  }
  function roomHalfSize(cat) {
    return (roomGridSide(cat) * CELL) / 2 + ROOM_PADDING;
  }

  

  function computeRoomOffsets() {
    const rows = [
      ['math', 'computer-systems'],
      ['ml', 'algorithms', 'programming'],
    ];
    const offsets = {};
    const rowHeights = rows.map(row => 2 * Math.max(...row.map(roomHalfSize)));
    const totalHeight = rowHeights.reduce((a, b) => a + b, 0) + ROOM_GUTTER * (rows.length - 1);
    let y = -totalHeight / 2;
    rows.forEach((row, ri) => {
      const rowHeight = rowHeights[ri];
      const cy = y + rowHeight / 2;
      const widths = row.map(cat => 2 * roomHalfSize(cat));
      const totalWidth = widths.reduce((a, b) => a + b, 0) + ROOM_GUTTER * (row.length - 1);
      let x = -totalWidth / 2;
      row.forEach((cat, ci) => {
        const w = widths[ci];
        offsets[cat] = { ox: x + w / 2, oy: cy };
        x += w + ROOM_GUTTER;
      });
      y += rowHeight + ROOM_GUTTER;
    });
    return offsets;
  }
  const ROOM_OFFSET = computeRoomOffsets();
  function roomCenter(cat) {
    const o = ROOM_OFFSET[cat] || { ox: 0, oy: 0 };
    return { cx: W / 2 + o.ox, cy: H / 2 + o.oy };
  }

   
  const roomDoorTargets = {};
  Object.keys(ROOMS).forEach(cat => { roomDoorTargets[cat] = []; });
  DOORS.forEach(([a, b]) => {
    (roomDoorTargets[a] = roomDoorTargets[a] || []).push(b);
    (roomDoorTargets[b] = roomDoorTargets[b] || []).push(a);
  });

   
  const prereqsOf  = {};
  const unlocksFor = {};
  nodes.forEach(n => { prereqsOf[n.id] = new Set(); unlocksFor[n.id] = new Set(); });
  edges.forEach(e => {
    unlocksFor[e.source] = unlocksFor[e.source] || new Set();
    prereqsOf[e.target]  = prereqsOf[e.target]  || new Set();
    unlocksFor[e.source].add(e.target);
    prereqsOf[e.target].add(e.source);
  });

   
  edges.forEach(e => { e.source = nodeById[e.source]; e.target = nodeById[e.target]; });

  

  const nodesByCategory = d3.group(nodes, n => n.category);
  function layoutNodes() {
    nodesByCategory.forEach((list, cat) => {
      const side = roomGridSide(cat);
      const center = roomCenter(cat);
      const rows = Math.ceil(list.length / side);
      const gridHeight = rows * CELL;
      list.forEach((n, i) => {
        const row = Math.floor(i / side);
        const itemsInRow = Math.min(side, list.length - row * side);
        const col = i % side;
        const rowWidth = itemsInRow * CELL;
        const startX = center.cx - rowWidth / 2 + CELL / 2;
        const startY = center.cy - gridHeight / 2 + CELL / 2;
        n.x = startX + col * CELL;
        n.y = startY + row * CELL;
      });
    });
  }
  layoutNodes();

   
  function bezierControlPoint(x1, y1, x2, y2) {
    const dx = x2-x1, dy = y2-y1;
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    return { mx: (x1+x2)/2 + (-dy/len)*18, my: (y1+y2)/2 + (dx/len)*18 };
  }
  function bezierAt(x1, y1, mx, my, x2, y2, t) {
    const u = 1 - t;
    return {
      x:  u*u*x1 + 2*u*t*mx + t*t*x2,
      y:  u*u*y1 + 2*u*t*my + t*t*y2,
      tx: 2*u*(mx-x1) + 2*t*(x2-mx),   
      ty: 2*u*(my-y1) + 2*t*(y2-my),   
    };
  }

   
  const DOOR_HALF  = 18;   
  const WALL_INSET = 4;    

  function roomRect(cat) {
    const { cx, cy } = roomCenter(cat);
    const half = roomHalfSize(cat);
    return { cx, cy, halfW: half, halfH: half };
  }

  

  const ROOM_MARGIN = 16;
  function clampNodeToRoom(d) {
    const rect = roomRect(d.category);
    if (!rect) return;
    const minX = rect.cx - rect.halfW + ROOM_MARGIN, maxX = rect.cx + rect.halfW - ROOM_MARGIN;
    const minY = rect.cy - rect.halfH + ROOM_MARGIN, maxY = rect.cy + rect.halfH - ROOM_MARGIN;
    if (d.x < minX) d.x = minX; else if (d.x > maxX) d.x = maxX;
    if (d.y < minY) d.y = minY; else if (d.y > maxY) d.y = maxY;
  }

  

  function doorExitPoint(rect, ox, oy) {
    const dx = ox - rect.cx, dy = oy - rect.cy;
    const tX = dx !== 0 ? rect.halfW / Math.abs(dx) : Infinity;
    const tY = dy !== 0 ? rect.halfH / Math.abs(dy) : Infinity;
    const t = Math.min(tX, tY);
    const x = rect.cx + dx * t, y = rect.cy + dy * t;
    const side = (t === tX) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'bottom' : 'top');
    return { x, y, side };
  }

  

  function wallSegments(rect, doorPoints) {
    const { cx, cy, halfW, halfH } = rect;
    const bySide = { top: [], bottom: [], left: [], right: [] };
    doorPoints.forEach(d => bySide[d.side].push(d));
    const segments = [];

    function emit(side, start, end, toCoords) {
      if (end - start <= 1) return;
      segments.push({ side, ...toCoords(start, end) });
    }

    ['top', 'bottom'].forEach(side => {
      const y = side === 'top' ? cy - halfH : cy + halfH;
      const doors = bySide[side].slice().sort((a, b) => a.x - b.x);
      let cursor = cx - halfW;
      doors.forEach(d => {
        emit(side, cursor, d.x - DOOR_HALF, (s, e) => ({ x1: s, y1: y, x2: e, y2: y }));
        cursor = d.x + DOOR_HALF;
      });
      emit(side, cursor, cx + halfW, (s, e) => ({ x1: s, y1: y, x2: e, y2: y }));
    });

    ['left', 'right'].forEach(side => {
      const x = side === 'left' ? cx - halfW : cx + halfW;
      const doors = bySide[side].slice().sort((a, b) => a.y - b.y);
      let cursor = cy - halfH;
      doors.forEach(d => {
        emit(side, cursor, d.y - DOOR_HALF, (s, e) => ({ x1: x, y1: s, x2: x, y2: e }));
        cursor = d.y + DOOR_HALF;
      });
      emit(side, cursor, cy + halfH, (s, e) => ({ x1: x, y1: s, x2: x, y2: e }));
    });

    return segments;
  }

   
  function buildRoomWalls(rect, doorPoints) {
    const outer = wallSegments(rect, doorPoints);
    const inner = wallSegments(
      { cx: rect.cx, cy: rect.cy, halfW: rect.halfW - WALL_INSET, halfH: rect.halfH - WALL_INSET },
      doorPoints
    );
    return outer.concat(inner);
  }

  function cornerTicks(rect) {
    const { cx, cy, halfW, halfH } = rect;
    return [
      [cx - halfW, cy - halfH,  1,  1],
      [cx + halfW, cy - halfH, -1,  1],
      [cx - halfW, cy + halfH,  1, -1],
      [cx + halfW, cy + halfH, -1, -1],
    ].map(([x, y, sx, sy]) => ({ x1: x, y1: y, x2: x + sx * 9, y2: y + sy * 9 }));
  }

   
  const roomG = g.append('g').attr('class', 'rooms').attr('pointer-events', 'none');
  const roomSel = roomG.selectAll('g.room')
    .data(Object.keys(ROOMS))
    .enter().append('g')
    .attr('class', 'room')
    .attr('data-cat', d => d);

  roomSel.append('g').attr('class', 'corner-ticks');
  roomSel.append('g').attr('class', 'walls');
  roomSel.append('g').attr('class', 'doors');
  roomSel.append('text')
    .attr('class', 'room-title')
    .attr('text-anchor', 'middle')
    .attr('font-size', 14)
    .attr('font-family', "'IM Fell English SC', Georgia, serif")
    .attr('font-variant', 'small-caps')
    .attr('letter-spacing', '0.03em')
    .attr('fill', d => CAT[d]?.color || '#5c3d11')
    .attr('fill-opacity', 0.8)
    .text(d => ROOMS[d].name);
  roomSel.append('text')
    .attr('class', 'room-subtitle')
    .attr('text-anchor', 'middle')
    .attr('font-size', 9)
    .attr('font-style', 'italic')
    .attr('font-family', "'IM Fell English', Georgia, serif")
    .attr('fill', d => CAT[d]?.color || '#5c3d11')
    .attr('fill-opacity', 0.55)
    .text(d => ROOMS[d].subtitle);

  function updateRooms() {
    roomSel.each(function(cat) {
      const rect = roomRect(cat);
      const others = roomDoorTargets[cat] || [];
      const doorPoints = others.map(o => doorExitPoint(rect, roomRect(o).cx, roomRect(o).cy));

      const room = d3.select(this);

      room.select('g.corner-ticks').selectAll('line')
        .data(cornerTicks(rect))
        .join('line')
        .attr('x1', d => d.x1).attr('y1', d => d.y1)
        .attr('x2', d => d.x2).attr('y2', d => d.y2)
        .attr('stroke', CAT[cat]?.color || '#5c3d11')
        .attr('stroke-width', 1.3)
        .attr('stroke-opacity', 0.65);

      room.select('g.walls').selectAll('line')
        .data(buildRoomWalls(rect, doorPoints))
        .join('line')
        .attr('x1', d => d.x1).attr('y1', d => d.y1)
        .attr('x2', d => d.x2).attr('y2', d => d.y2)
        .attr('stroke', CAT[cat]?.color || '#5c3d11')
        .attr('stroke-width', 1.1)
        .attr('stroke-opacity', 0.55);

      room.select('g.doors').selectAll('path')
        .data(doorPoints)
        .join('path')
        .attr('d', d => {
           
          const nx = d.side === 'left' ? 1 : d.side === 'right' ? -1 : 0;
          const ny = d.side === 'top' ? 1 : d.side === 'bottom' ? -1 : 0;
          const r = DOOR_HALF;
          if (nx !== 0) {
            return `M${d.x},${d.y - r} A${r},${r} 0 0 ${nx > 0 ? 1 : 0} ${d.x},${d.y + r}`;
          }
          return `M${d.x - r},${d.y} A${r},${r} 0 0 ${ny > 0 ? 1 : 0} ${d.x + r},${d.y}`;
        })
        .attr('fill', 'none')
        .attr('stroke', CAT[cat]?.color || '#5c3d11')
        .attr('stroke-width', 1)
        .attr('stroke-opacity', 0.4);

      room.select('text.room-title')
        .attr('x', rect.cx).attr('y', rect.cy - rect.halfH + 19);
      room.select('text.room-subtitle')
        .attr('x', rect.cx).attr('y', rect.cy - rect.halfH + 31);
    });
  }
  updateRooms();

   
  const clusterLabelG = g.append('g').attr('class', 'cluster-labels').attr('pointer-events', 'none');
  Object.keys(ROOMS).forEach(cat => {
    const info = CAT[cat];
    if (!info) return;
    const pos = roomCenter(cat);
    clusterLabelG.append('text')
      .attr('data-cat', cat)
      .attr('x', pos.cx)
      .attr('y', pos.cy)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 54)
      .attr('font-family', "'IM Fell English SC', Georgia, serif")
      .attr('fill', info.color)
      .attr('fill-opacity', 0.07)
      .attr('letter-spacing', '0.06em')
      .text(info.label);
  });

   
   
  const FOOT_SPACING = 45;    
  const FOOT_MIN_PAIRS = 1;
  const FOOT_MAX_PAIRS = 6;
  const FOOT_MAX_COUNT = FOOT_MAX_PAIRS * 2;
   
  const footG = g.append('g').attr('class', 'footsteps').attr('pointer-events', 'none');

   
  function footTsForPairs(n) {
    const PAIR_GAP = 0.09;
    if (n <= 1) return [0.5 - PAIR_GAP / 2, 0.5 + PAIR_GAP / 2];
    const margin = 0.08;
    const span = 1 - margin * 2;
    const ts = [];
    for (let i = 0; i < n; i++) {
      const c = margin + span * (i / (n - 1));
      ts.push(Math.max(0, c - PAIR_GAP / 2), Math.min(1, c + PAIR_GAP / 2));
    }
    return ts;
  }

   
   
  const FOOT_W = 10, FOOT_H = 16;
  const footstepMeta = edges.map(e => {
    const grp = footG.append('g');
    const els = [];
    for (let s = 0; s < FOOT_MAX_COUNT; s++) {
      const el = grp.append('image')
        .attr('href', s % 2 === 0 ? '/images/left.png' : '/images/right.png')
        .attr('width', FOOT_W)
        .attr('height', FOOT_H)
        .attr('x', -FOOT_W / 2)
        .attr('y', -FOOT_H / 2)
        .style('mix-blend-mode', 'multiply')
        .style('opacity', '0')
        .node();
      els.push(el);
    }
    return { edge: e, grp: grp.node(), els, activeCount: FOOT_MAX_COUNT };
  });

   
  function updateFootsteps(meta) {
    const e = meta.edge;
    if (!e.source || !e.target) return;
    const x1 = e.source.x, y1 = e.source.y;
    const x2 = e.target.x, y2 = e.target.y;
    if (x1 == null || y1 == null || x2 == null || y2 == null) return;
    const { mx, my } = bezierControlPoint(x1, y1, x2, y2);

     
    const dx = x2 - x1, dy = y2 - y1;
    const dlen = Math.sqrt(dx*dx + dy*dy) || 1;
     
    const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
     
    const px_off = -dy / dlen, py_off = dx / dlen;

     
    const pairs = Math.min(FOOT_MAX_PAIRS, Math.max(FOOT_MIN_PAIRS, Math.round(dlen / FOOT_SPACING)));
    const ts = footTsForPairs(pairs);
    meta.activeCount = ts.length;

    meta.els.forEach((el, s) => {
      if (s >= ts.length) {
        el.style.opacity = '0';
        return;
      }
      const t = ts[s];
      const p = bezierAt(x1, y1, mx, my, x2, y2, t);

       
      const side = s % 2 === 0 ? -6 : 6;
      const px = p.x + px_off * side;
      const py = p.y + py_off * side;

      el.setAttribute('transform', `translate(${px},${py}) rotate(${angle})`);
    });
  }

   
  const EW = 18, EH = 12;

   
  const nodeG = g.append('g').attr('class', 'nodes');
  let nodeEls = nodeG.selectAll('g.node-env')
    .data(nodes)
    .enter().append('g')
    .attr('class', 'node-env')
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag',  dragged)
      .on('end',   dragEnd))
    .on('mouseover', onHover)
    .on('mousemove', onHoverMove)
    .on('mouseout',  onHoverOut)
    .on('click', onClick)
    .on('dblclick', onDblClick);

   
  nodeEls.append('rect')
    .attr('x', -EW/2 + 1.5).attr('y', -EH/2 + 1.5)
    .attr('width', EW).attr('height', EH)
    .attr('rx', 2)
    .attr('fill', 'rgba(44,24,16,0.13)')
    .attr('pointer-events', 'none');

   
  nodeEls.append('rect')
    .attr('class', 'env-body')
    .attr('x', -EW/2).attr('y', -EH/2)
    .attr('width', EW).attr('height', EH)
    .attr('rx', 2)
    .attr('fill', '#fdf6e3')
    .attr('stroke', d => CAT[d.category]?.color || '#5c3d11')
    .attr('stroke-width', 1.2);

   
  nodeEls.append('path')
    .attr('d', `M${-EW/2},${-EH/2} L0,1 L${EW/2},${-EH/2}`)
    .attr('fill', 'none')
    .attr('stroke', d => CAT[d.category]?.color || '#5c3d11')
    .attr('stroke-width', 0.75)
    .attr('stroke-opacity', 0.5)
    .attr('pointer-events', 'none');

   
  nodeEls.append('circle')
    .attr('class', 'env-seal')
    .attr('cy', 1)
    .attr('r', 2.5)
    .attr('fill', '#740001')
    .attr('stroke', '#D3A625')
    .attr('stroke-width', 0.5)
    .attr('pointer-events', 'none');

   
  const labelG = g.append('g').attr('class', 'labels').attr('pointer-events', 'none');
  let labelEls = labelG.selectAll('text')
    .data(nodes)
    .enter().append('text')
    .attr('font-size', 9)
    .attr('font-family', "'IM Fell English SC', Georgia, serif")
    .attr('fill', '#2c1810')
    .attr('fill-opacity', 0)
    .attr('text-anchor', 'middle')
    .attr('dy', '-11')
    .text(d => d.label);

  function updateLabels() {
    labelEls.attr('fill-opacity', currentZoom > 2.5 ? 0.7 : 0);
  }

   
  function renderPositions() {
    footstepMeta.forEach(updateFootsteps);
    nodeEls.attr('transform', d => `translate(${d.x},${d.y}) scale(${nodeScale(d)})`);
    labelEls.attr('x', d => d.x).attr('y', d => d.y);
  }

   
  function updateClusterLabels() {
    clusterLabelG.selectAll('text').each(function() {
      const cat = d3.select(this).attr('data-cat');
      if (!cat) return;
      const pos = roomCenter(cat);
      d3.select(this).attr('x', pos.cx).attr('y', pos.cy);
    });
  }

   
  let activeNode = null;
  let activeFilter = 'all';
  let searchQ = '';

   
  function onHover(event, d) {
    tooltip.style.display = 'block';
    tooltip.innerHTML = `
      <div class="tt-title">${d.fullLabel}</div>
      <div class="tt-cat">${CAT[d.category]?.label || d.category}</div>
      <div class="tt-hint">Click to explore &nbsp;·&nbsp; Double-click to open</div>`;
    d3.select(this).raise()
      .attr('transform', `translate(${d.x},${d.y}) scale(1.85)`);
  }
  function onHoverMove(event) {
    const x = event.clientX, y = event.clientY;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    tooltip.style.left = (x + 14 + tw > window.innerWidth ? x - tw - 14 : x + 14) + 'px';
    tooltip.style.top  = (y + 14 + th > window.innerHeight ? y - th - 14 : y + 14) + 'px';
  }
  function onHoverOut(event, d) {
    tooltip.style.display = 'none';
    if (activeNode !== d) {
      d3.select(this)
        .attr('transform', `translate(${d.x},${d.y}) scale(${nodeScale(d)})`)
        .style('opacity', nodeOpacity(d));
    }
  }

  function nodeScale(d) {
    if (activeNode === d) return 1.6;
    if (activeNode) {
      if (prereqsOf[activeNode.id]?.has(d.id)) return 1.3;
      if (unlocksFor[activeNode.id]?.has(d.id)) return 1.3;
      return 0.65;
    }
    if (searchQ) return d._match ? 1.4 : 0.65;
    return 1;
  }
  function nodeOpacity(d) {
    if (!activeNode && !searchQ) return 0.92;
    if (activeNode) {
      if (activeNode === d) return 1;
      if (prereqsOf[activeNode.id]?.has(d.id)) return 1;
      if (unlocksFor[activeNode.id]?.has(d.id)) return 1;
      return 0.13;
    }
    return d._match ? 1 : 0.13;
  }

  /* footstep opacity — only shown for edges connected to the active node */
  function footOpacityValue(meta) {
    if (!activeNode) return 0;
    const sId = meta.edge.source.id || meta.edge.source;
    const tId = meta.edge.target.id || meta.edge.target;
    if (activeNode.id === tId && prereqsOf[activeNode.id]?.has(sId))
      return 0.85;
    if (activeNode.id === sId && unlocksFor[activeNode.id]?.has(tId))
      return 0.85;
    return 0;
  }

  function refreshVisuals() {
    nodeEls.each(function(d) {
      d3.select(this)
        .attr('transform', `translate(${d.x},${d.y}) scale(${nodeScale(d)})`)
        .style('opacity', nodeOpacity(d));
    });
    footstepMeta.forEach(meta => {
      const op = footOpacityValue(meta);
      meta.els.forEach((el, s) => el.style.opacity = s < meta.activeCount ? op : 0);
    });
  }

  /* ── click: select node ── */
  function onClick(event, d) {
    event.stopPropagation();
    if (activeNode === d) {
      activeNode = null;
      hideInfo();
    } else {
      activeNode = d;
      showInfo(d);
    }
    refreshVisuals();
  }

  /* ── double-click: open post ── */
  function onDblClick(event, d) {
    window.open(`/posts/${d.id}/`, '_blank', 'noopener');
  }

  /* ── click canvas: deselect ── */
  svg.on('click', () => {
    if (activeNode) {
      activeNode = null;
      hideInfo();
      refreshVisuals();
    }
  });

  /* ── info panel ── */
  function showInfo(d) {
    const prereqs = [...(prereqsOf[d.id] || [])].map(id => nodeById[id]?.label).filter(Boolean);
    const unlocks = [...(unlocksFor[d.id] || [])].map(id => nodeById[id]?.label).filter(Boolean);
    const color = CAT[d.category]?.color || '#5c3d11';

    let prereqHtml = prereqs.length
      ? prereqs.slice(0,5).map(l => `<div class="info-item">· ${l}</div>`).join('')
         + (prereqs.length > 5 ? `<div class="info-item" style="opacity:.5">+${prereqs.length-5} more</div>` : '')
      : '<div class="info-item" style="opacity:.4">None — entry-level post</div>';

    let unlockHtml = unlocks.length
      ? unlocks.slice(0,5).map(l => `<div class="info-item">· ${l}</div>`).join('')
         + (unlocks.length > 5 ? `<div class="info-item" style="opacity:.5">+${unlocks.length-5} more</div>` : '')
      : '<div class="info-item" style="opacity:.4">Endpoint — no dependents</div>';

    infoPanel.innerHTML = `
      <div class="info-close" id="info-close">✕</div>
      <div class="info-title" style="border-left:3px solid ${color};padding-left:8px">${d.fullLabel}</div>
      <div class="info-section">
        <div class="info-label prereqs">Read first (${prereqs.length})</div>
        <div class="info-items">${prereqHtml}</div>
      </div>
      <div class="info-section">
        <div class="info-label unlocks">Unlocks (${unlocks.length})</div>
        <div class="info-items">${unlockHtml}</div>
      </div>
      <div class="info-actions">
        <a class="info-open" href="/posts/${d.id}/" target="_blank" rel="noopener">Open post →</a>
      </div>`;
    infoPanel.style.display = 'block';
    document.getElementById('info-close').onclick = () => {
      activeNode = null;
      hideInfo();
      refreshVisuals();
    };
  }
  function hideInfo() {
    infoPanel.style.display = 'none';
  }

  /* ── drag: positions are static, so dragging just moves the one envelope
     directly (clamped to its own room) and refreshes what touches it ── */
  function dragStart(event, d) {
    d3.select(this).raise();
  }
  function dragged(event, d) {
    d.x = event.x; d.y = event.y;
    clampNodeToRoom(d);
    d3.select(this).attr('transform', `translate(${d.x},${d.y}) scale(${nodeScale(d)})`);
    labelEls.filter(n => n === d).attr('x', d.x).attr('y', d.y);
    footstepMeta.forEach(meta => {
      if (meta.edge.source === d || meta.edge.target === d) updateFootsteps(meta);
    });
  }
  function dragEnd(event, d) {}

  /* ── category filter ── */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const col = btn.dataset.color;
    if (col) btn.style.setProperty('--c', col);

    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = '';
        b.style.color = 'rgba(244,232,193,0.75)';
        b.style.borderColor = 'rgba(244,232,193,0.35)';
      });
      btn.classList.add('active');
      btn.style.background = '#f4e8c1';
      btn.style.borderColor = '#f4e8c1';
      btn.style.color = '#2c1810';
      activeFilter = cat;
      activeNode = null;
      hideInfo();
      applyFilter();
    });
  });

  function applyFilter() {
    const q = searchQ.toLowerCase();
    nodeEls.each(function(d) {
      const catMatch = activeFilter === 'all' || d.category === activeFilter;
      const searchMatch = !q || d.label.toLowerCase().includes(q) || d.fullLabel.toLowerCase().includes(q);
      d._visible = catMatch;
      d._match   = catMatch && searchMatch;
    });
    nodeEls
      .attr('display', d => d._visible ? null : 'none')
      .each(function(d) {
        if (!d._visible) return;
        const s = d._match ? (q ? 1.4 : 1) : 0.65;
        const op = q ? (d._match ? 1 : 0.1) : 0.92;
        d3.select(this)
          .attr('transform', `translate(${d.x},${d.y}) scale(${s})`)
          .style('opacity', op);
      });
    labelEls.attr('display', d => d._visible ? null : 'none');
    footstepMeta.forEach(meta => {
      const sId = meta.edge.source.id || meta.edge.source;
      const tId = meta.edge.target.id || meta.edge.target;
      meta.grp.style.display = (nodeById[sId]?._visible && nodeById[tId]?._visible) ? '' : 'none';
    });
    noResults.style.display = (q && !nodes.some(n => n._match)) ? 'block' : 'none';
  }

  /* ── search ── */
  searchEl.addEventListener('input', function() {
    searchQ = this.value.trim();
    activeNode = null;
    hideInfo();
    applyFilter();
    refreshVisuals();

    if (searchQ) {
      const match = nodes.find(n => n._match);
      if (match) {
        const tx = W/2 - match.x * 1.5;
        const ty = H/2 - match.y * 1.5;
        svg.transition().duration(500)
          .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(1.5));
      }
    }
  });

   
  nodes.forEach(n => { n._visible = true; n._match = true; });

  renderPositions();

   
  function zoomToFit(animate) {
    const pad = 60;
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const x0 = Math.min(...xs) - pad, x1 = Math.max(...xs) + pad;
    const y0 = Math.min(...ys) - pad, y1 = Math.max(...ys) + pad;
    const scale = Math.min(W / (x1-x0), H / (y1-y0), 1);
    const tx = W/2 - scale*(x0+x1)/2;
    const ty = H/2 - scale*(y0+y1)/2;
    const sel = animate ? svg.transition().duration(800) : svg;
    sel.call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
  }
  zoomToFit(true);

   
  window.addEventListener('resize', () => {
    W = canvasEl.clientWidth;
    H = canvasEl.clientHeight;
    svg.attr('width', W).attr('height', H);
    layoutNodes();
    updateClusterLabels();
    updateRooms();
    updateCompass();
    updateBorder();
    renderPositions();
  });

})();
</script>

<script>
  (function() {
    var btn = document.createElement('button');
    
  })();
</script>
</body>
