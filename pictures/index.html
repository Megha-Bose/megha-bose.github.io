</div>

<script>
(function() {
  var carousel = document.getElementById('main-carousel');
  if (!carousel) return;

  var slides    = Array.from(carousel.querySelectorAll('.carousel-slide'));
  var dots      = Array.from(carousel.querySelectorAll('.dot'));
  var prevBtn   = carousel.querySelector('.carousel-prev');
  var nextBtn   = carousel.querySelector('.carousel-next');
  var toggleBtn = document.getElementById('order-toggle');

  var order    = slides.map(function(_, i) { return i; });
  var current  = 0;
  var reversed = false;

  function showIndex(n) {
    slides[order[current]].classList.remove('active');
    if (dots[current]) dots[current].classList.remove('active');
    current = ((n % slides.length) + slides.length) % slides.length;
    slides[order[current]].classList.add('active');
    if (dots[current]) dots[current].classList.add('active');
  }

  prevBtn.addEventListener('click', function() { showIndex(current - 1); });
  nextBtn.addEventListener('click', function() { showIndex(current + 1); });
  dots.forEach(function(dot, i) {
    dot.addEventListener('click', function() { showIndex(i); });
  });

  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      order.reverse();
      reversed = !reversed;
      slides.forEach(function(s) { s.classList.remove('active'); });
      dots.forEach(function(d) { d.classList.remove('active'); });
      current = 0;
      slides[order[0]].classList.add('active');
      if (dots[0]) dots[0].classList.add('active');
      toggleBtn.textContent = reversed ? 'newest first' : 'oldest first';
    });
  }

  var touchStartX = 0;
  carousel.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  carousel.addEventListener('touchend', function(e) {
    var diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) showIndex(current + (diff > 0 ? 1 : -1));
  });
})();
</script>

    </main>
    <script>
      (function() {
        var btn = document.getElementById('theme-toggle');
        function applyTheme(theme, save) {
          if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
          if (save) localStorage.setItem('theme', theme);
        }
        btn.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme');
          applyTheme(current === 'light' ? 'dark' : 'light', true);
        });
        window.addEventListener('pageshow', function(e) {
          if (e.persisted) {
            applyTheme(localStorage.getItem('theme') === 'light' ? 'light' : 'dark', false);
          }
        });
      })();
    </script>
